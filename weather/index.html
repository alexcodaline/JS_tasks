<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="././js/app.js"></script>
    <title>Weather</title>
  </head>
  <body>
    <h1>Weather task</h1>
    <div>
      <label for="tempInput">Temp:</label>
      <input type="number" id="tempInput" />
    </div>
    <div>
      <label for="humidityInput">Humidity:</label>
      <input type="number" id="humidityInput" />
    </div>
    <div>
      <label for="pressureInput">Pressure:</label>
      <input type="number" id="pressureInput" />
    </div>

    <p id="temp"></p>
    <p id="humidity"></p>
    <p id="pressure"></p>
    <p id="forecast"></p>
    <p id="history"></p>
  </body>
</html>
